<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>How Codex Works</title>
  <meta name="description" content="OpenAI Codex CLI 源码架构导读">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta property="og:title" content="How Codex Works">
  <meta property="og:description" content="OpenAI Codex CLI 源码架构导读">
  <meta property="og:image" content="https://hqhq1025.github.io/how-codex-works/assets/codex-icon.png">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #3157ff;
      --sidebar-width: 268px;
      --sidebar-nav-link-color--active: #3157ff;
      --sidebar-nav-link-border-color--active: #3157ff;
      --code-theme-background: #f6f8fa;
      --code-inline-background: #eef3ff;
    }
    .app-name {
      padding: 1rem 1rem 0.4rem;
    }
    .app-name .app-name-link {
      color: #111827;
      display: inline-flex;
      align-items: center;
      flex-direction: column;
      font-weight: 700;
      letter-spacing: 0;
    }
    .app-name .app-name-link::after {
      content: "How Codex Works";
      display: block;
      font-size: 0.98rem;
      line-height: 1.25;
      margin-top: 0.15rem;
    }
    .app-name img {
      width: 64px;
      height: 64px;
      display: block;
      margin: 0 auto 0.45rem;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(49, 87, 255, 0.18);
    }
    .markdown-section {
      max-width: 920px;
    }
    .markdown-section h1 {
      border-bottom: 2px solid #3157ff;
      padding-bottom: 0.25em;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .markdown-section blockquote {
      border-left-color: #3157ff;
      background: #f4f7ff;
      color: #334155;
      padding: 0.75rem 1rem;
    }
    .mermaid {
      text-align: center;
      margin: 1.25rem 0;
    }
  </style>
</head>
<body>
  <div id="app">加载文档中...</div>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    window.$docsify = {
      name: 'How Codex Works',
      logo: './assets/codex-icon.png',
      repo: 'hqhq1025/how-codex-works',
      loadSidebar: true,
      loadNavbar: true,
      requestHeaders: {
        'cache-control': 'no-cache'
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md'
      },
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 0,
        namespace: 'how-codex-works-v2',
        paths: 'auto',
        depth: 6,
        placeholder: '搜索全文',
        noData: '没有结果'
      },
      markdown: {
        renderer: {
          code: function(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + escapeHtml(code) + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            if (window.mermaid) {
              window.mermaid.run({ querySelector: '.mermaid' }).catch(function(error) {
                console.warn('Mermaid render skipped:', error);
              });
            }
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-rust.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-toml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
